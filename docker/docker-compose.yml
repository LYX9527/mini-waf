version: '3.8'

services:
  mini-waf:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: mini-waf
    ports:
      - "48080:48080" # WAF 服务端口
      - "8081:8081"   # 管理控制台端口
    environment:
      # 替换为真实的 MySQL 比如外部或者如下面启动的 mysql 容器
      - DATABASE_URL=mysql://mini_waf_user:password@mysql:3306/mini_waf
      - JWT_SECRET=super_secret_waf_key_please_change
      - RUST_LOG=info
    volumes:
      - ./data:/opt/mini_waf/data
    restart: unless-stopped
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    container_name: mini-waf-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=mini_waf
      - MYSQL_USER=mini_waf_user
      - MYSQL_PASSWORD=password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password

volumes:
  mysql_data:
